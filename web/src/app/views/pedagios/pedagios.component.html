<mat-tab-group>
    @if (authService.isAdmin()) {
        <mat-tab label="Cadastrar Pedágio">
            <app-pedagios-form></app-pedagios-form>
        </mat-tab>
    }
    <mat-tab label="Listar Pedágios">
        <app-pedagios-list></app-pedagios-list>
    </mat-tab>
    @if (authService.isAdmin()) {
        <mat-tab label="Atualizar Pedágio">
            <app-pedagios-update></app-pedagios-update>
        </mat-tab>
    }
    @if (authService.isAdmin()) {
        <mat-tab label="Importar Pedágios">
            <app-csv-import
                apiUrl="http://localhost:9999/api/importar-pedagios"
                entityLabel="Pedágios"
                (imported)="onImported()"
            ></app-csv-import>
        </mat-tab>
    }
</mat-tab-group>
