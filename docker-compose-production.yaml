services:
  api01:
    build:
      context: .
      dockerfile: Dockerfile.production
    restart: unless-stopped
    environment:
      APP_ENV: production
      RUST_LOG: ${RUST_LOG:-info}
      HTTP_PORT: 8081
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POOL_SIZE: ${API_POOL_SIZE:-30}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-8}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      UPLOAD_DIR: /actix/tmp
      DB_UPLOAD_DIR: /uploaded
      SEED_ADMIN: ${SEED_ADMIN:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bgm.com}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - uploaded-files:/actix/tmp
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-9999}:9999"
    volumes:
      - ./nginx.production.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - db-data:/var/lib/postgresql/data
      - uploaded-files:/uploaded
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  app:
    driver: bridge

volumes:
  db-data:
  uploaded-files:
