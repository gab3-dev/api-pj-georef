<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login — BGM</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <input matInput formControlName="email" type="email" placeholder="Email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <input matInput formControlName="senha" type="password" placeholder="Senha">
        </mat-form-field>

        @if (erro) {
          <p class="erro">{{ erro }}</p>
        }

        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid" class="full-width">
          Entrar
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
