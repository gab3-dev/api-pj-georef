<div class="update-container">
  <mat-form-field class="search-field" appearance="outline">
    <mat-label>Buscar Pedágio</mat-label>
    <input matInput [formControl]="searchControl" [matAutocomplete]="auto"
           placeholder="Digite o nome, rodovia, cidade ou código">
    <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn"
                      (optionSelected)="onSelected($event.option.value)">
      @for (p of filteredPedagios; track p.id_pedagio) {
        <mat-option [value]="p">{{ p.codigo }} - {{ p.nome }}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>

  @if (selectedPedagio) {
    <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
      <div class="text-field">
        <label>Longitude</label>
        <input type="number" formControlName="longitude">
      </div>
      <div class="text-field">
        <label>Latitude</label>
        <input type="number" formControlName="latitude">
      </div>
      <div class="text-field">
        <label>Código da Operadora</label>
        <input type="number" formControlName="codigo_operadora">
      </div>
      <div class="text-field">
        <label>Nome</label>
        <input type="text" formControlName="nome">
      </div>
      <div class="text-field">
        <label>Situação</label>
        <input type="text" formControlName="situacao">
      </div>
      <div class="text-field">
        <label>Rodovia</label>
        <input type="text" formControlName="rodovia">
      </div>
      <div class="text-field">
        <label>Km</label>
        <input type="number" formControlName="km">
      </div>
      <div class="text-field">
        <label>Sentido</label>
        <select formControlName="sentido">
          <option value="" disabled>Selecione uma opção</option>
          <option value="norte">Norte</option>
          <option value="sul">Sul</option>
          <option value="leste">Leste</option>
          <option value="oeste">Oeste</option>
        </select>
      </div>
      <div class="text-field">
        <label>Cidade</label>
        <input type="text" formControlName="cidade">
      </div>
      <div class="text-field">
        <label>Estado</label>
        <input type="text" formControlName="estado">
      </div>
      <div class="text-field">
        <label>Código do Pedágio</label>
        <input type="text" formControlName="codigo_pedagio">
      </div>
      <div class="text-field">
        <label>Orientação</label>
        <input type="text" formControlName="orientacao">
      </div>
      <div class="text-field">
        <label>Tipo</label>
        <input type="text" formControlName="tipo">
      </div>
      <div class="text-field">
        <label>Jurisdição</label>
        <input type="text" formControlName="jurisdicao">
      </div>
      <div class="text-field">
        <label>Cobrança Especial</label>
        <select formControlName="cobranca_especial">
          <option value="" disabled>Selecione uma opção</option>
          <option value="true">Cobrança especial</option>
          <option value="false">Cobrança não especial</option>
        </select>
      </div>
      <div class="text-field">
        <label>Categoria</label>
        <input type="text" formControlName="categoria">
      </div>
      <div class="text-field">
        <label>Razão Social</label>
        <input type="text" formControlName="razao_social">
      </div>
      <div class="text-field">
        <label>CNPJ</label>
        <input type="text" formControlName="cnpj">
      </div>
      <div class="text-field">
        <label>Email</label>
        <input type="email" formControlName="email">
      </div>
      <div class="text-field">
        <label>Telefone</label>
        <input type="text" formControlName="telefone">
      </div>

      @if (loading) {
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      }

      @if (successMessage) {
        <div class="message success">{{ successMessage }}</div>
      }

      @if (errorMessage) {
        <div class="message error">{{ errorMessage }}</div>
      }

      <button mat-raised-button color="primary" type="submit"
              [disabled]="updateForm.invalid || loading">
        Atualizar Pedágio
      </button>
    </form>
  }
</div>
